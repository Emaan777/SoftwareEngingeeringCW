<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ride Buddy - Activities</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Available Activities</h1>
            <p>Find your perfect ride or run buddy!</p>
        </div>

        <div class="search-section">
            <form id="search-form" class="search-form">
                <div class="search-controls">
                    <div class="form-group">
                        <label for="activity-type">Activity Type</label>
                        <select id="activity-type" name="activity-type">
                            <option value="All">All Activities</option>
                            <option value="Running">Running</option>
                            <option value="Cycling">Cycling</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="location-search">Location</label>
                        <input type="text" id="location-search" name="location" placeholder="Enter location...">
                    </div>
                    <button type="submit" class="search-button">
                        <i class="fas fa-search"></i> Search
                    </button>
                </div>
            </form>
        </div>

        <div class="activities-grid">
            <!-- Activity cards will be dynamically inserted here by JavaScript -->
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
